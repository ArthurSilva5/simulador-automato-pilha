<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simulador: Autômato de Pilha</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-white text-dark p-4">
  <h2 class="text-center mb-4">Autômato de Pilha</h2>

  <div class="container">
    <form id="automatoForm" autocomplete="off">
      <div class="row">

        <div class="col-md-4 mt-3">
          <div class="mb-2">
            <label for="alfabetoEntradaInput" class="form-label fw-bold">Alfabeto de entrada:</label>
            <input type="text" id="alfabetoEntradaInput" class="form-control form-control-sm" placeholder="Ex: a,b,c" required />
          </div>

          <div class="mb-2">
            <label for="estadosInput" class="form-label fw-bold">Lista de estados:</label>
            <input type="text" id="estadosInput" class="form-control form-control-sm" placeholder="Ex: q0,q1,q2" required />
          </div>

          <div class="mb-2">
            <label for="estadoInicialInput" class="form-label fw-bold">Estado inicial:</label>
            <input type="text" id="estadoInicialInput" class="form-control form-control-sm" placeholder="Ex: q0" required />
          </div>

          <div class="mb-2">
            <label for="estadosFinaisInput" class="form-label fw-bold">Estados finais:</label>
            <input type="text" id="estadosFinaisInput" class="form-control form-control-sm" placeholder="Ex: q1" required />
          </div>

          <div class="mb-2">
            <label for="alfabetoPilhaInput" class="form-label fw-bold">Alfabeto da pilha:</label>
            <input type="text" id="alfabetoPilhaInput" class="form-control form-control-sm" placeholder="Ex: A,B" required />
          </div>

          <button id="confirmarDadosEntradaButton" type="button" class="btn btn-success btn-sm mt-3">
            Confirmar Dados
          </button>
        </div>

        <div class="col-md-8 mt-3">
          <h4 class="fw-bold mb-3 text-center">Transições</h4>

          <table class="table table-bordered align-middle">
            <thead class="table-light">
              <tr>
                <th>Estado Atual</th>
                <th>Próximo Estado</th>
                <th>Lido da Fita</th>
                <th>Lido da Pilha</th>
                <th>Gravado na Pilha</th>
                <th></th>
                <th></th>
              </tr>
            </thead>
            <tbody id="corpoTabelaTransicoes"></tbody>
          </table>

          <button id="adicionarTransicaoButton" type="button" class="btn btn-success btn-sm fw-bold" disabled>
            + Adicionar Transição
          </button>
        </div>

      </div>
    </form>

    <div class="text-center mt-4">
      <button id="verificarAutomatoButton" type="button" class="btn btn-primary btn-sm fw-bold w-50 p-2">
        <i class="bi bi-repeat p-2"></i> Verificar Autômato
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./scripts/validaEntradas.js"></script>
  <script src="./scripts/validaTransicoes.js"></script>
  <script src="./scripts/validaAutomato.js"></script>
</body>
</html>
