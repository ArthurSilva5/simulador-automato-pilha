<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Autômato de Pilha</title>

    <!--CSS-->
    <link rel="stylesheet" href="./css/estilos.css">
    <link rel="icon" type="image/png" href="icone.png">

    <!--Bootstrap-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white text-dark p-4">

    <h2 id="tituloPagina" class="text-center mb-4">Autômato de Pilha</h2>

    <div class="container">
    <form id="automatoForm">

        <div class="row">

        <div class="col-md-4 mt-3">
            <div class="mb-2">
            <label id="alfabetoEntradaLabel" for="alfabetoEntradaInput" class="form-label fw-bold">Alfabeto de entrada:</label>
            <input type="text" id="alfabetoEntradaInput" class="form-control form-control-sm" placeholder="Ex: A,B,C" required>
            </div>

            <div class="mb-2">
            <label id="estadosLabel" for="estadosInput" class="form-label fw-bold">Lista de estados:</label>
            <input type="text" id="estadosInput" class="form-control form-control-sm" placeholder="Ex: Q0,Q1,Q2" required>
            </div>

            <div class="mb-2 md">
            <label id="estadoInicialLabel" for="estadoInicialInput" class="form-label fw-bold">Estado inicial:</label>
            <input type="text" id="estadoInicialInput" class="form-control form-control-sm" placeholder="Ex: Q0" required>
            </div>

            <div class="mb-2">
            <label id="estadosFinaisLabel" for="estadosFinaisInput" class="form-label fw-bold">Estados finais:</label>
            <input type="text" id="estadosFinaisInput" class="form-control form-control-sm" placeholder="Ex: Q2,Q3" required>
            </div>

            <div class="mb-2">
            <label id="alfabetoPilhaLabel" for="alfabetoPilhaInput" class="form-label fw-bold">Alfabeto da pilha:</label>
            <input type="text" id="alfabetoPilhaInput" class="form-control form-control-sm" placeholder="Ex: A,B" required>
            </div>
        </div>

        <div class="col-md-8 mt-3">
            <h4 class="fw-bold mb-3 text-center">Transições</h4>

            <table class="table table-bordered align-middle" id="tabelaTransicoes">
            <thead class="table-light">
                <tr>
                <th>Estado Atual</th>
                <th>Símbolo Entrada</th>
                <th>Topo da Pilha</th>
                <th>Próximo Estado</th>
                <th>Novos Símbolos Pilha</th>
                <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpoTabelaTransicoes">
            </tbody>
            </table>

            <button id="adicionarTransicaoBtn" type="button" class="btn btn-sm btn-success fw-bold">
            + Adicionar Transição
            </button>
        </div>
        </div>

        <div class="text-center mt-4">
        <button id="verificarAutomatoButton" type="submit" class="btn btn-primary btn-sm fw-bold px-4 w-50 p-2">
            <i class="bi bi-repeat p-2"></i> Verificar Automato
        </button>
        </div>

    </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./scripts/validaEntradas.js"></script>
</body>
</html>
